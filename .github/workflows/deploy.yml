name: 🚀 Build & Deploy Astro Blog

on:
  push:
    branches:
      - main
    paths-ignore:
      - public/link.json

  workflow_dispatch:
  
  workflow_run:
    workflows: ["🔗 Friend Links Check"]
    types:
      - completed

permissions:
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      # Check out repository code
      - name: 🔍 Checkout repository
        uses: actions/checkout@v4

      # Setup Node & pnpm environment
      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.18.0
          cache: npm

      # Install dependencies with retry
      - name: 📦 Install dependencies
        run: |
          echo "📦 正在安装依赖..."
          for i in 1 2 3; do
            npm install && break || (echo "❌ 安装失败，${i} 秒后重试第 $((i+1)) 次..." && sleep $((i * 5)))
          done
          echo "✅ 依赖安装完成"

      # Clean old build artifacts (prevent residual files)
      - name: 🧹 Clean old build artifacts
        run: |
          echo "🧹 清理旧构建目录..."
          rm -rf dist .astro
          echo "✅ 清理完成"

      # Build Astro static files
      - name: 🏗️ Build Astro project
        run: |
          echo "🏗️ 正在构建 Astro 项目..."
          npm run build
          echo "✅ 构建完成"

      # Deploy to page branch (GitHub Pages or static repository)
      - name: 📦 Deploy to page branch
        run: |
          cd dist
          git init
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add .
          COMMIT_MSG=$(printf "%s" "${{ github.event.head_commit.message }}" | tr -d '\n' | tr -d '\r')
          git commit -m "$COMMIT_MSG ==> [$(date +"%Y-%m-%d %H:%M:%S")]"
          git push --force --quiet "https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" master:page
          echo "✅ 已推送至 GitHub page 分支"


      # Sync to CNB repository (with GitHub commit message)
      - name: 🌐 Sync to CNB repository
        run: |
          cd dist
          git branch -M main
          git remote add cnb "https://${{ secrets.CNB_USERNAME }}:${{ secrets.CNB_TOKEN }}@cnb.cool/ljxme/lisblogsourcecode.git"
          git fetch cnb || true
          # Get current GitHub commit message
          COMMIT_MSG=$(git log -1 --pretty=%s)
          GITHUB_COMMIT_URL="https://github.com/${{ github.repository }}/commit/${{ github.sha }}"
          git commit --allow-empty -m "🔄 Sync from GitHub: ${COMMIT_MSG}\n🔗 ${GITHUB_COMMIT_URL}"
          git push --force --quiet cnb main
          echo "✅ 已同步至 CNB 仓库（带 GitHub 提交信息）"

      # Deploy to server via SSH (with GitHub commit message)
      - name: 🔧 SSH Deploy to Server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          passphrase: ${{ secrets.PASSPHRASE }}
          port: ${{ secrets.PORT }}
          script: |
            cd /opt/1panel/www/sites/myblog/index/
            git config --global --add safe.directory "$(pwd)"
            git fetch --all --depth=1
            git reset --hard origin/main
            git pull --depth=1
            echo "✅ 已拉取 page 分支最新内容"

      # Refresh DogeCloud CDN directory cache (with GitHub commit message)
      # Documentation:
      # - Get access token (create in DogeCloud console and save to repo Secrets): https://docs.dogecloud.com/cdn/api-access-token
      # - Submit refresh task API (directory refresh type=dir): https://docs.dogecloud.com/cdn/api-refresh-add
      # - To avoid failures caused by interface changes, the pre-created access token is used directly `DOGE_ACCESS_TOKEN`
      - name: ♻️ Refresh CDN Directory
        id: refresh_cdn
        if: success()
        env:
          # Add Secrets in GitHub repo settings: DOGE_ACCESS_KEY, DOGE_SECRET_KEY
          DOGE_ACCESS_KEY: ${{ secrets.DOGE_ACCESS_KEY }}
          DOGE_SECRET_KEY: ${{ secrets.DOGE_SECRET_KEY }}
        run: |
          echo "♻️ 正在刷新 CDN 目录缓存..."
          if [ -z "$DOGE_ACCESS_KEY" ] || [ -z "$DOGE_SECRET_KEY" ]; then
            echo "❌ 缺少 DOGE_ACCESS_KEY 或 DOGE_SECRET_KEY，请在仓库 Secrets 中配置"; exit 1;
          fi
          pip install --quiet requests
          python - <<'PY'
          import os, json, urllib.parse, hmac, hashlib, requests, sys, re

          def dogecloud_api(api_path, data, json_mode=False):
              """
              调用多吉云 API：计算 HMAC-SHA1 签名并提交请求
              :param api_path: 接口路径（示例：/cdn/refresh/add.json）
              :param data:     请求数据 dict（表单或 JSON）
              :param json_mode: 是否以 JSON 发送（默认表单）
              :return: (resp_json, resp_text)
              """
              access_key = os.environ['DOGE_ACCESS_KEY']
              secret_key = os.environ['DOGE_SECRET_KEY']
              if json_mode:
                  body = json.dumps(data, separators=(',', ':'))
                  mime = 'application/json'
              else:
                  body = urllib.parse.urlencode(data)
                  mime = 'application/x-www-form-urlencoded'
              sign_str = api_path + "\n" + body
              sign = hmac.new(secret_key.encode('utf-8'), sign_str.encode('utf-8'), hashlib.sha1).hexdigest()
              auth = f"TOKEN {access_key}:{sign}"
              resp = requests.post('https://api.dogecloud.com' + api_path, data=body, headers={'Authorization': auth, 'Content-Type': mime})
              print('🔎 响应状态码：', resp.status_code)
              print('📨 响应内容：', resp.text)
              if 200 <= resp.status_code < 300:
                  try:
                      r = resp.json()
                  except Exception:
                      print('❌ 返回非 JSON'); sys.exit(1)
                  if r.get('code') == 200:
                      return r, resp.text
                  else:
                      print('❌ API 返回错误：', r.get('msg'))
                      sys.exit(1)
              else:
                  sys.exit(1)

          def main():
              """
              提交目录刷新任务至 https://blog.ljx.icu/
              使用 rtype=path 进行目录刷新，提取任务 ID（如 PREFETCH.TX.xxxxx）写入 GitHub 输出。
              """
              api_path = '/cdn/refresh/add.json'
              urls = ['https://blog.ljx.icu/']
              payload = {'rtype': 'path', 'urls': json.dumps(urls, separators=(',', ':'))}
              r, raw = dogecloud_api(api_path, payload, json_mode=False)

              data = r.get('data') or {}
              task_id = data.get('task_id') or data.get('id') or data.get('taskId') or data.get('task')
              if not task_id and isinstance(raw, str):
                  m = re.search(r'(PREFETCH\.TX\.[A-Za-z0-9_-]+)', raw)
                  if m:
                      task_id = m.group(1)

              if task_id:
                  print('✅ 刷新任务提交成功，任务 ID：', task_id)
                  github_output = os.environ.get('GITHUB_OUTPUT')
                  if github_output:
                      with open(github_output, 'a', encoding='utf-8') as f:
                          f.write(f"refresh_task_id={task_id}\n")
                  sys.exit(0)
              else:
                  print('⚠️ 未获取到刷新任务 ID，后续状态查询将回退为目录路径查询')
                  sys.exit(0)

          if __name__ == '__main__':
              main()
          PY